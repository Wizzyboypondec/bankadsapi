<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Bank Ads Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="style.css">
  <script>
    // If already logged in, redirect to dashboard
    if (localStorage.getItem('bankads_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</head>
<body class="antialiased min-h-screen relative flex flex-col justify-center items-center">
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2" style="bottom: 0; right: 0;"></div>

  <!-- Absolute Positioned Nav -->
  <a href="index.html" class="absolute top-8 left-8 flex items-center gap-2">
    <img src="assets/logo.png" alt="Bank Ads Engine Logo" class="h-10 w-10 object-contain rounded-full shadow-[0_0_15px_rgba(56,189,248,0.5)]">
    <span class="text-2xl font-bold tracking-tight text-white">Bank<span class="text-brand-400">Ads</span></span>
  </a>

  <main class="w-full max-w-md px-4 z-10">
    <div class="glass-card rounded-3xl p-8 md:p-10 w-full">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
        <p class="text-gray-400">Sign in to the Bank Ads Engine</p>
      </div>

      <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/50 text-red-500 rounded-lg p-3 mb-6 text-sm text-center">
        Invalid credentials. Please try again.
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
          <div class="relative">
            <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
            <input type="email" id="email" required class="glass-input w-full rounded-xl py-3 pl-12 pr-4 focus:ring-brand-400" placeholder="admin@bank.com">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <div class="relative">
            <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
            <input type="password" id="password" required class="glass-input w-full rounded-xl py-3 pl-12 pr-4 focus:ring-brand-400" placeholder="••••••••">
          </div>
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center text-gray-400 hover:text-white cursor-pointer transition-colors">
            <input type="checkbox" class="mr-2 rounded border-gray-600 bg-transparent text-brand-400 focus:ring-brand-400/50">
            Remember me
          </label>
          <a href="#" class="text-brand-400 hover:text-brand-500 transition-colors">Forgot password?</a>
        </div>

        <button type="submit" id="submitBtn" class="w-full btn-primary text-white py-4 rounded-xl font-medium tracking-wide flex justify-center items-center gap-2">
          <span>Sign In</span>
          <i class="ph ph-sign-in text-xl"></i>
        </button>
      </form>

      <p class="mt-8 text-center text-gray-400 text-sm">
        Don't have an account? <a href="register.html" class="text-brand-400 font-medium hover:text-brand-500 transition-colors">Get Started</a>
      </p>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.classList.add('hidden');
      submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i>';
      submitBtn.disabled = true;

      try {
        const res = await fetch('http://localhost:3030/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          // Success
          localStorage.setItem('bankads_user', JSON.stringify(data.user));
          localStorage.setItem('bankads_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          // Fail
          errorMsg.textContent = data.error || 'Invalid credentials.';
          errorMsg.classList.remove('hidden');
      } catch (err) {
        errorMsg.textContent = 'Server connection error.';
        errorMsg.classList.remove('hidden');
        submitBtn.innerHTML = '<span>Sign In</span> <i class="ph ph-sign-in text-xl"></i>';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
