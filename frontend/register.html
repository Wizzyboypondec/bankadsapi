<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Bank Ads Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    if (localStorage.getItem('bankads_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</head>
<body class="antialiased min-h-screen relative flex flex-col justify-center items-center py-12">
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2" style="bottom: 0; right: 0;"></div>

  <!-- Absolute Positioned Nav -->
  <a href="index.html" class="absolute top-8 left-8 flex items-center gap-2 hidden md:flex z-50">
    <i class="ph ph-target text-4xl text-brand-400"></i>
    <span class="text-2xl font-bold tracking-tight text-white">Bank<span class="text-brand-400">Ads</span></span>
  </a>

  <main class="w-full max-w-lg px-4 z-10">
    <div class="glass-card rounded-3xl p-8 md:p-10 w-full relative z-20">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
        <p class="text-gray-400">Start delivering targeted bank ads</p>
      </div>

      <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/50 text-red-500 rounded-lg p-3 mb-6 text-sm text-center">
        Error creating account.
      </div>

      <form id="registerForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Bank / Organization Name</label>
          <div class="relative">
            <i class="ph ph-buildings absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
            <input type="text" id="name" required class="glass-input w-full rounded-xl py-3 pl-12 pr-4" placeholder="ACME Bank Plc">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Work Email Address</label>
          <div class="relative">
            <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
            <input type="email" id="email" required class="glass-input w-full rounded-xl py-3 pl-12 pr-4" placeholder="admin@bank.com">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <div class="relative">
            <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
            <input type="password" id="password" required class="glass-input w-full rounded-xl py-3 pl-12 pr-4" placeholder="••••••••">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Select Plan</label>
          <select id="plan" class="glass-input w-full rounded-xl py-3 px-4 appearance-none" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" fill=\"%239ca3af\"><path d=\"M6 9l6 6 6-6\"/></svg>'); background-repeat: no-repeat; background-position: right 1rem center;">
            <!-- styling options bg to dark so they are readable on dark mode selection drop down -->
            <option value="basic" class="bg-gray-800 text-white">Basic (NGN 15,000/mo)</option>
            <option value="pro" class="bg-gray-800 text-white" selected>Pro (NGN 75,000/mo)</option>
            <option value="enterprise" class="bg-gray-800 text-white">Enterprise (Custom)</option>
          </select>
        </div>

        <div class="pt-2">
          <button type="submit" id="submitBtn" class="w-full btn-primary text-white py-4 rounded-xl font-medium tracking-wide flex justify-center items-center gap-2">
            <span>Create Account</span>
            <i class="ph ph-user-plus text-xl"></i>
          </button>
        </div>
      </form>

      <p class="mt-8 text-center text-gray-400 text-sm">
        Already have an account? <a href="login.html" class="text-brand-400 font-medium hover:text-brand-500 transition-colors">Sign In</a>
      </p>
    </div>
  </main>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const plan = document.getElementById('plan').value;
      
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.classList.add('hidden');
      submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i>';
      submitBtn.disabled = true;

      try {
        const createRes = await fetch('http://localhost:3030/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, plan })
        });
        const data = await createRes.json();

        if (createRes.ok) {
          localStorage.setItem('bankads_user', JSON.stringify(data.user));
          localStorage.setItem('bankads_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Failed to create account.';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'Server connection error. Ensure backend is running.';
        errorMsg.classList.remove('hidden');
      }
      
      submitBtn.innerHTML = '<span>Create Account</span> <i class="ph ph-user-plus text-xl"></i>';
      submitBtn.disabled = false;
    });
  </script>
</body>
</html>
